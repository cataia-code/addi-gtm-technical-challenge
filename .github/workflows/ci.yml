name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Ruff check
        run: ruff check src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v

  validate-scoring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Validate scoring integrity
        run: pytest tests/test_scoring_integrity.py -v

  notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Execute credential-free notebooks
        run: |
          jupyter nbconvert --to notebook --execute notebooks/01_diagnostico_seleccion_s1s2.ipynb --output /tmp/01_diagnostico_seleccion_s1s2.ipynb --ExecutePreprocessor.timeout=300
          jupyter nbconvert --to notebook --execute notebooks/02_scoring_model.ipynb --output /tmp/02_scoring_model.ipynb --ExecutePreprocessor.timeout=300
      # Notebooks 04, 05, 06 and 07 are skipped in CI because they depend on
      # external credentials/services: Groq, Gmail, Slack, Twilio and Apify.
